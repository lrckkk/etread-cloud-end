version: '3.8'
services:
  # --- 缓存：Redis ---
  redis:
    image: redis:7.0
    container_name: etread-redis
    ports:
      - "6379:6379"
    volumes:
      # 把 Redis 的数据存到 D盘的专门文件夹里
      - C:/Users/runcheng tianxia/Desktop/etread/data/redis:/data

  # --- 存储：MinIO ---
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: etread-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      # 【核心魔法】：把 MinIO 的数据存到 D盘的专门文件夹里！
      # Windows 路径用正斜杠 "/" 或双反斜杠 "\\" 都可以
      - C:/Users/runcheng tianxia/Desktop/etread/data/minio:/data